name: QoLPlugin
version: '${project.version}'
main: com.kelpwing.kelpylandiaplugin.KelpylandiaPlugin
api-version: '1.16'
author: Kelpwing
description: A collection of quality-of-life features and commands for Minecraft servers, including chat channels, moderation tools, teleportation commands, and more!!
depend: [LuckPerms]
softdepend: [PlaceholderAPI, Vault]

commands:
  # Chat Commands
  channel:
    description: Channel management command
    usage: /channel <subcommand>
    aliases: [ch]
    permission: qol.channel.use
  multichat:
    description: MultiChat admin command
    usage: /multichat <subcommand>
    permission: qol.admin
    
  # Moderation Commands
  kelpylandiaReload:
    description: Reload the plugin configuration
    usage: /kelpylandiaReload
    permission: qol.reload
    aliases: [qolreload, qreload, kpreload, kreload]
    permission-message: "You don't have permission to use this command."

  # Update checker
  kpupdate:
    description: Check for and download QoLPlugin updates from Modrinth.
    usage: /kpupdate <check|download>
    permission: qol.update
    aliases: [pluginupdate, qolupdate]
    permission-message: "You don't have permission to use this command."
  mute:
    description: Mute a player.
    usage: /mute <player> [duration] [reason]
    permission: qol.mod.mute
    permission-message: "You don't have permission to use this command."
  warn:
    description: Warn a player.
    usage: /warn <player> [reason]
    permission: qol.mod.warn
    permission-message: "You don't have permission to use this command."
  kick:
    description: Kick a player.
    usage: /kick <player> [reason]
    permission: qol.mod.kick
    permission-message: "You don't have permission to use this command."
  ban:
    description: Ban a player.
    usage: /ban <player> [duration] [reason]
    permission: qol.mod.ban
    permission-message: "You don't have permission to use this command."
  ipban:
    description: Ban a player's IP.
    usage: /ipban <player> [duration] [reason]
    permission: qol.mod.ipban
    permission-message: "You don't have permission to use this command."
  warns:
    description: View a player's warnings.
    usage: /warns <player>
    permission: qol.mod.warns
    permission-message: "You don't have permission to use this command."
  hist:
    description: View a player's punishment history.
    usage: /hist <player>
    permission: qol.mod.history
    permission-message: "You don't have permission to use this command."
  unban:
    description: Unban a player.
    usage: /unban <player>
    permission: qol.mod.unban
    permission-message: "You don't have permission to use this command."
  unwarn:
    description: Remove a warning from a player.
    usage: /unwarn <player>
    permission: qol.mod.unwarn
    permission-message: "You don't have permission to use this command."
  unmute:
    description: Unmute a player.
    usage: /unmute <player>
    permission: qol.mod.unmute
    permission-message: "You don't have permission to use this command."
  vanish:
    description: Toggle vanish mode for moderation.
    usage: /vanish [player]
    permission: qol.vanish
    aliases: [v]
    permission-message: "You don't have permission to use this command."
  invsee:
    description: View and modify another player's inventory in real-time.
    usage: /invsee <player> [inv|armor|ender]
    permission: qol.invsee
    aliases: [inv, openinv]
    permission-message: "You don't have permission to use this command."
  pvp:
    description: Toggle your PvP status on or off.
    usage: /pvp [on|off|status]
    permission: qol.pvp
    aliases: [pvptoggle]
  jail:
    description: Jail a player for a specified duration.
    usage: /jail <player> <duration> [reason]
    permission: qol.mod.jail
    permission-message: "You don't have permission to use this command."
  release:
    description: Release a player from jail.
    usage: /release <player> [reason]
    permission: qol.mod.jail
    aliases: [unjail]
    permission-message: "You don't have permission to use this command."
  freeze:
    description: Freeze a player in place.
    usage: /freeze <player>
    permission: qol.mod.freeze
    permission-message: "You don't have permission to use this command."
  unfreeze:
    description: Unfreeze a player.
    usage: /unfreeze <player>
    permission: qol.mod.freeze
    aliases: [thaw]
    permission-message: "You don't have permission to use this command."

  # Economy commands are registered dynamically when the economy system
  # is enabled in economy.yml.  They are NOT listed here to avoid
  # registering placeholder command entries that IC would process.

  # Home, TPA, Back, and Workbench commands are registered dynamically
  # based on config settings. They will not appear here to avoid
  # conflicting with other plugins when disabled.

permissions:
  qol.*:
    description: Grants all permissions
    default: op
    children:
      qol.admin: true
      qol.mod.*: true
      qol.channel.*: true
      qol.pvp: true
      qol.homes: true
      qol.tpa: true
      qol.tpa.here: true
      qol.teleport.bypass.cooldown: true
      qol.back: true
      qol.dback: true
      qol.back.bypass.cooldown: true
      qol.spawn: true
      qol.spawn.others: true
      qol.gamemode.*: true
      qol.workbench.*: true
      qol.nickname: true
      qol.nickname.others: true
      qol.enchant: true
      qol.enchant.unsafe: true
      qol.afk: true
      qol.msg: true
      qol.msg.reply: true
      qol.msg.whispertoggle: true
      qol.suicide: true
      qol.skull: true
      qol.repair: true
      qol.repair.others: true
      qol.sudo: true
      qol.socialspy: true
      qol.commandspy: true
      qol.fly: true
      qol.fly.others: true
      qol.god: true
      qol.god.others: true
      qol.heal: true
      qol.heal.others: true
      qol.starve: true
      qol.starve.others: true
      qol.feed: true
      qol.feed.others: true
      qol.flyspeed: true
      qol.flyspeed.others: true
      qol.trash: true
      qol.lore: true
      qol.hat: true
      qol.warp: true
      qol.setwarp: true
      qol.delwarp: true
      qol.rtp: true
      qol.rtp.bypass.cooldown: true
      qol.seen: true
      qol.stuck: true
      qol.noclip: true
      qol.noclip.others: true
      qol.runat: true
      qol.anvil.color: true
      qol.homes.others: true
      qol.rules: true
      qol.smite: true
      qol.report: true
      qol.report.notify: true
      qol.recipe: true
      qol.kit: true
      qol.kit.admin: true
      qol.economy.*: true
      
  qol.admin:
    description: Allows admin commands
    default: op

  qol.update:
    description: Check for and download plugin updates via /kpupdate
    default: op

  qol.update.notify:
    description: Receive an in-game notification on join when a plugin update is available
    default: op
    
  qol.reload:
    description: Allows reloading the plugin configuration
    default: op
    
  qol.mod.*:
    description: Grants all moderation permissions
    default: op
    children:
      qol.mod.mute: true
      qol.mod.warn: true
      qol.mod.kick: true
      qol.mod.ban: true
      qol.mod.ipban: true
      qol.mod.warns: true
      qol.mod.history: true
      qol.mod.unban: true
      qol.mod.unwarn: true
      qol.mod.unmute: true
      qol.vanish: true
      qol.vanish.others: true
      qol.vanish.see: true
      qol.invsee: true
      qol.mod.jail: true
      qol.mod.freeze: true
      
  qol.mod.basic:
    description: Basic moderation permissions
    default: false
    children:
      qol.mod.mute: true
      qol.mod.warn: true
      qol.mod.kick: true
      qol.mod.warns: true
      qol.mod.history: true
      qol.mod.unmute: true
      qol.mod.unwarn: true
      
  qol.mod.advanced:
    description: Advanced moderation permissions
    default: false
    children:
      qol.mod.ban: true
      qol.mod.ipban: true
      qol.mod.unban: true
      
  qol.channel.*:
    description: Grants all channel permissions
    default: false
    children:
      qol.channel.use: true
      qol.channel.admin: true
      
  qol.channel.use:
    description: Allows basic channel usage
    default: true
    
  qol.channel.admin:
    description: Allows channel administration
    default: op
    
  qol.vanish:
    description: Allows vanishing and unvanishing
    default: op
    
  qol.vanish.others:
    description: Allows vanishing other players
    default: op
    
  qol.vanish.see:
    description: Allows seeing vanished players
    default: op
    
  qol.invsee:
    description: Allows viewing and modifying other players' inventories
    default: op
    
  qol.pvp:
    description: Allows toggling PvP status
    default: true
    
  # Home Permissions
  qol.homes:
    description: Grants all home permissions
    default: true
    children:
      qol.homes.teleport: true
      qol.homes.set: true
      qol.homes.delete: true
      qol.homes.list: true
      qol.homes.rename: true

  qol.homes.teleport:
    description: Allows using /home to teleport to homes
    default: true

  qol.homes.set:
    description: Allows using /sethome to create homes
    default: true

  qol.homes.delete:
    description: Allows using /delhome to delete homes
    default: true

  qol.homes.list:
    description: Allows using /homes to list homes
    default: true

  qol.homes.rename:
    description: Allows using /renhome to rename homes
    default: true

  qol.homes.max.*:
    description: Wildcard — grants all qol.homes.max.<n> nodes (do not assign directly)
    default: false

  qol.homes.max.1:
    description: Allows a maximum of 1 home
    default: false
  qol.homes.max.2:
    description: Allows a maximum of 2 homes
    default: false
  qol.homes.max.3:
    description: Allows a maximum of 3 homes
    default: false
  qol.homes.max.5:
    description: Allows a maximum of 5 homes
    default: false
  qol.homes.max.10:
    description: Allows a maximum of 10 homes
    default: false
  qol.homes.max.15:
    description: Allows a maximum of 15 homes
    default: false
  qol.homes.max.20:
    description: Allows a maximum of 20 homes
    default: false
  qol.homes.max.25:
    description: Allows a maximum of 25 homes
    default: false
  qol.homes.max.50:
    description: Allows a maximum of 50 homes
    default: false
  qol.homes.max.100:
    description: Allows a maximum of 100 homes
    default: false
    
  # TPA Permissions
  qol.tpa:
    description: Allows sending and receiving teleport requests
    default: true
    
  qol.tpa.here:
    description: Allows using /tpahere to request others teleport to you
    default: true
    
  qol.teleport.bypass.cooldown:
    description: Bypass teleport cooldown
    default: op

  # Workbench Permissions
  qol.workbench.*:
    description: Grants all workbench permissions
    default: true
    children:
      qol.workbench.craft: true
      qol.workbench.enderchest: true
      qol.workbench.anvil: true
      qol.workbench.grindstone: true
      qol.workbench.stonecutter: true
      qol.workbench.smithing: true
      qol.workbench.cartography: true
      qol.workbench.loom: true

  qol.workbench.craft:
    description: Allows opening a virtual crafting table
    default: true

  qol.workbench.enderchest:
    description: Allows opening your ender chest
    default: true

  qol.workbench.anvil:
    description: Allows opening a virtual anvil
    default: true

  qol.workbench.grindstone:
    description: Allows opening a virtual grindstone
    default: true

  qol.workbench.stonecutter:
    description: Allows opening a virtual stonecutter
    default: true

  qol.workbench.smithing:
    description: Allows opening a virtual smithing table
    default: true

  qol.workbench.cartography:
    description: Allows opening a virtual cartography table
    default: true

  qol.workbench.loom:
    description: Allows opening a virtual loom
    default: true

  qol.workbench.others:
    description: Allows opening workbenches for other players
    default: op

  qol.back:
    description: Allows using /back to return to previous location
    default: true

  qol.dback:
    description: Allows using /dback to return to death location
    default: true

  qol.back.bypass.cooldown:
    description: Bypass the back command cooldown
    default: op

  # Spawn Permissions
  qol.spawn:
    description: Allows using /spawn to teleport to world spawn
    default: true

  qol.spawn.others:
    description: Allows teleporting other players to spawn
    default: op

  # Gamemode Permissions
  qol.gamemode.*:
    description: Grants all gamemode permissions
    default: op
    children:
      qol.gamemode.survival: true
      qol.gamemode.creative: true
      qol.gamemode.adventure: true
      qol.gamemode.spectator: true
      qol.gamemode.others: true

  qol.gamemode.survival:
    description: Allows switching to survival mode
    default: op

  qol.gamemode.creative:
    description: Allows switching to creative mode
    default: op

  qol.gamemode.adventure:
    description: Allows switching to adventure mode
    default: op

  qol.gamemode.spectator:
    description: Allows switching to spectator mode
    default: op

  qol.gamemode.others:
    description: Allows changing other players' gamemode
    default: op

  # Nickname Permissions
  qol.nickname:
    description: Allows using /nick to set or reset your own nickname
    default: true

  qol.nickname.others:
    description: Allows setting or resetting other players' nicknames
    default: op

  # Enchant Permissions
  qol.enchant:
    description: Allows using /enchant to enchant items
    default: op

  qol.enchant.unsafe:
    description: Allows bypassing enchantment limits (any level, any item)
    default: op

  # AFK Permissions
  qol.afk:
    description: Allows using /afk to toggle AFK status
    default: true

  # Messaging Permissions
  qol.msg:
    description: Allows sending private messages with /w
    default: true

  qol.msg.reply:
    description: Allows using /r to reply to private messages
    default: true

  qol.msg.whispertoggle:
    description: Allows using /wt to set or clear whisper target
    default: true

  # Suicide Permission
  qol.suicide:
    description: Allows using /suicide to kill yourself
    default: true

  # Skull Permission
  qol.skull:
    description: Allows using /skull to get a player head
    default: op

  # Repair Permissions
  qol.repair:
    description: Allows using /repair to repair your own items
    default: op

  qol.repair.others:
    description: Allows using /repair on other players
    default: op

  # Sudo Permission
  qol.sudo:
    description: Allows using /sudo to force players to run commands
    default: op

  # SocialSpy Permission
  qol.socialspy:
    description: Allows using /ss to spy on private messages and channel chat
    default: op

  # CommandSpy Permission
  qol.commandspy:
    description: Allows using /cs to spy on commands other players run
    default: op

  # Fly Permissions
  qol.fly:
    description: Allows using /fly to toggle flight mode
    default: op

  qol.fly.others:
    description: Allows using /fly on other players or * for all
    default: op

  # God Permissions
  qol.god:
    description: Allows using /god to toggle invincibility
    default: op

  qol.god.others:
    description: Allows using /god on other players or * for all
    default: op

  # Heal Permissions
  qol.heal:
    description: Allows using /heal to heal yourself
    default: op

  qol.heal.others:
    description: Allows using /heal on other players or * for all
    default: op

  # Starve Permissions
  qol.starve:
    description: Allows using /starve to starve yourself
    default: op

  qol.starve.others:
    description: Allows using /starve on other players or * for all
    default: op

  # Feed Permissions
  qol.feed:
    description: Allows using /feed to fill your food bar
    default: op

  qol.feed.others:
    description: Allows using /feed on other players or * for all
    default: op

  # FlySpeed/WalkSpeed Permissions
  qol.flyspeed:
    description: Allows using /flyspeed and /walkspeed to change your speed
    default: op

  qol.flyspeed.others:
    description: Allows using /flyspeed and /walkspeed on other players
    default: op

  # Trash Permission
  qol.trash:
    description: Allows using /trash to open a disposal inventory
    default: true

  # Lore Permission
  qol.lore:
    description: Allows using /lore to edit item lore
    default: op

  # Hat Permission
  qol.hat:
    description: Allows using /hat to wear items on your head
    default: true

  # Warp Permissions
  qol.warp:
    description: Allows using /warp and /warps
    default: true

  qol.setwarp:
    description: Allows creating warps with /setwarp
    default: op

  qol.delwarp:
    description: Allows deleting warps with /delwarp
    default: op

  # Random Teleport Permission
  qol.rtp:
    description: Allows using /rtp for random teleportation
    default: true
  qol.rtp.bypass.cooldown:
    description: Bypass /rtp cooldown
    default: op

  # Seen Permission
  qol.seen:
    description: Allows using /seen to check when a player was last online
    default: op

  # Jail Permission
  qol.mod.jail:
    description: Allows jailing and releasing players
    default: op

  # Freeze Permission
  qol.mod.freeze:
    description: Allows freezing and unfreezing players
    default: op

  # Stuck Permission
  qol.stuck:
    description: Allows using /stuck to escape nether roof or void
    default: true

  # Noclip Permission
  qol.noclip:
    description: Allows using /noclip to fly through blocks
    default: op

  qol.noclip.others:
    description: Allows using /noclip on other players
    default: op

  # RunAt Permission
  qol.runat:
    description: Allows using /runat to run commands as another player (in-game)
    default: op

  # Anvil Color Permission
  qol.anvil.color:
    description: Allows using color codes in anvil renames
    default: op

  # Admin Home Access Permission
  qol.homes.others:
    description: Allows teleporting to other players' homes
    default: op

  # Rules Permission
  qol.rules:
    description: Allows using /rules to view server rules
    default: true

  # Smite Permission
  qol.smite:
    description: Allows using /smite to strike lightning on a player
    default: op

  # Report Permissions
  qol.report:
    description: Allows using /report to submit player or bug reports
    default: true

  qol.report.notify:
    description: Receive staff notifications when reports are submitted
    default: op

  # Recipe Permissions
  qol.recipe:
    description: Allows using /recipe to view crafting recipes
    default: true

  # Kit Permissions
  qol.kit:
    description: Allows using /kit to claim kits
    default: true

  qol.kit.admin:
    description: Allows creating, editing, deleting, and managing kits
    default: op

  qol.kit.starter:
    description: Allows claiming the starter kit
    default: true

  qol.kit.tools:
    description: Allows claiming the tools kit
    default: true

  # Economy Permissions
  qol.economy.*:
    description: Grants all economy permissions
    default: op
    children:
      qol.economy.use: true
      qol.economy.admin: true
      qol.economy.baltop.exclude: true

  qol.economy.use:
    description: Grants basic economy permissions (balance, pay, sell, baltop, price, value, tax view, price history)
    default: true
    children:
      qol.economy.balance: true
      qol.economy.balance.others: false
      qol.economy.pay: true
      qol.economy.baltop: true
      qol.economy.sell: true
      qol.economy.price: true
      qol.economy.value: true
      qol.economy.tax: true
      qol.economy.pricehistory: true

  qol.economy.admin:
    description: Grants admin-level economy permissions (price management, tax editing, shop editor)
    default: op
    children:
      qol.economy.tax.edit: true
      qol.economy.setprice: true
      qol.economy.delprice: true
      qol.economy.shopedit: true
      qol.economy.balance.others: true
      qol.economy.eco: true

  qol.economy.balance:
    description: Allows checking your own balance
    default: true

  qol.economy.balance.others:
    description: Allows checking other players' balances
    default: op

  qol.economy.pay:
    description: Allows paying other players
    default: true

  qol.economy.baltop:
    description: Allows viewing the balance leaderboard
    default: true

  qol.economy.sell:
    description: Allows selling items (/sell and /sellgui)
    default: true

  qol.economy.price:
    description: Allows checking item prices
    default: true

  qol.economy.value:
    description: Allows checking total item value
    default: true

  qol.economy.tax:
    description: Allows viewing tax info
    default: true

  qol.economy.tax.edit:
    description: Allows setting the tax rate
    default: op

  qol.economy.setprice:
    description: Allows setting item sell prices
    default: op

  qol.economy.delprice:
    description: Allows removing item sell prices
    default: op

  qol.economy.shopedit:
    description: Allows using the shop editor GUI
    default: op

  qol.economy.eco:
    description: Allows managing player balances (add, subtract, set, reset, check)
    default: op

  qol.economy.baltop.exclude:
    description: Excludes a player from the baltop leaderboard
    default: op

  qol.economy.pricehistory:
    description: Allows viewing item price history
    default: true

  # ─────────────────────────────────────────────────────────────
  # Legacy permission aliases — backward-compat for servers that
  # already granted the old "kelpylandia.*" nodes.
  # Granting any of these automatically grants the matching qol.*
  # node via Bukkit's children mechanism, so no re-configuration
  # is needed after updating to QoLPlugin.
  # ─────────────────────────────────────────────────────────────
  kelpylandia.*:
    description: "[Legacy] Grants all permissions (alias for qol.*)"
    default: false
    children:
      qol.*: true

  kelpylandia.admin:
    description: "[Legacy] Alias for qol.admin"
    default: false
    children:
      qol.admin: true

  kelpylandia.update:
    description: "[Legacy] Alias for qol.update"
    default: false
    children:
      qol.update: true

  kelpylandia.update.notify:
    description: "[Legacy] Alias for qol.update.notify"
    default: false
    children:
      qol.update.notify: true

  kelpylandia.reload:
    description: "[Legacy] Alias for qol.reload"
    default: false
    children:
      qol.reload: true

  kelpylandia.mod.*:
    description: "[Legacy] Alias for qol.mod.*"
    default: false
    children:
      qol.mod.*: true

  kelpylandia.mod.basic:
    description: "[Legacy] Alias for qol.mod.basic"
    default: false
    children:
      qol.mod.basic: true

  kelpylandia.mod.advanced:
    description: "[Legacy] Alias for qol.mod.advanced"
    default: false
    children:
      qol.mod.advanced: true

  kelpylandia.mod.mute:
    description: "[Legacy] Alias for qol.mod.mute"
    default: false
    children:
      qol.mod.mute: true

  kelpylandia.mod.warn:
    description: "[Legacy] Alias for qol.mod.warn"
    default: false
    children:
      qol.mod.warn: true

  kelpylandia.mod.kick:
    description: "[Legacy] Alias for qol.mod.kick"
    default: false
    children:
      qol.mod.kick: true

  kelpylandia.mod.ban:
    description: "[Legacy] Alias for qol.mod.ban"
    default: false
    children:
      qol.mod.ban: true

  kelpylandia.mod.ipban:
    description: "[Legacy] Alias for qol.mod.ipban"
    default: false
    children:
      qol.mod.ipban: true

  kelpylandia.mod.warns:
