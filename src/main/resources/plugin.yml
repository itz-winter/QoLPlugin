name: KelpylandiaPlugin
version: '${project.version}'
main: com.kelpwing.kelpylandiaplugin.KelpylandiaPlugin
api-version: '1.16'
author: Kelpwing
description: Combined multichat and moderation plugin for Kelpylandia
depend: [LuckPerms]
softdepend: [PlaceholderAPI]

commands:
  # Chat Commands
  channel:
    description: Channel management command
    usage: /channel <subcommand>
    aliases: [ch]
    permission: kelpylandia.channel.use
  multichat:
    description: MultiChat admin command
    usage: /multichat <subcommand>
    permission: kelpylandia.admin
    
  # Moderation Commands
  kelpylandiaReload:
    description: Reload the plugin configuration
    usage: /kelpylandiaReload
    permission: kelpylandia.reload
    aliases: [kpreload, kreload]
    permission-message: "You don't have permission to use this command."
  mute:
    description: Mute a player.
    usage: /mute <player> [duration] [reason]
    permission: kelpylandia.mod.mute
    permission-message: "You don't have permission to use this command."
  warn:
    description: Warn a player.
    usage: /warn <player> [reason]
    permission: kelpylandia.mod.warn
    permission-message: "You don't have permission to use this command."
  kick:
    description: Kick a player.
    usage: /kick <player> [reason]
    permission: kelpylandia.mod.kick
    permission-message: "You don't have permission to use this command."
  ban:
    description: Ban a player.
    usage: /ban <player> [duration] [reason]
    permission: kelpylandia.mod.ban
    permission-message: "You don't have permission to use this command."
  ipban:
    description: Ban a player's IP.
    usage: /ipban <player> [duration] [reason]
    permission: kelpylandia.mod.ipban
    permission-message: "You don't have permission to use this command."
  warns:
    description: View a player's warnings.
    usage: /warns <player>
    permission: kelpylandia.mod.warns
    permission-message: "You don't have permission to use this command."
  hist:
    description: View a player's punishment history.
    usage: /hist <player>
    permission: kelpylandia.mod.history
    permission-message: "You don't have permission to use this command."
  unban:
    description: Unban a player.
    usage: /unban <player>
    permission: kelpylandia.mod.unban
    permission-message: "You don't have permission to use this command."
  unwarn:
    description: Remove a warning from a player.
    usage: /unwarn <player>
    permission: kelpylandia.mod.unwarn
    permission-message: "You don't have permission to use this command."
  unmute:
    description: Unmute a player.
    usage: /unmute <player>
    permission: kelpylandia.mod.unmute
    permission-message: "You don't have permission to use this command."
  vanish:
    description: Toggle vanish mode for moderation.
    usage: /vanish [player]
    permission: kelpylandia.vanish
    aliases: [v]
    permission-message: "You don't have permission to use this command."
  invsee:
    description: View and modify another player's inventory in real-time.
    usage: /invsee <player> [inv|armor|ender]
    permission: kelpylandia.invsee
    aliases: [inv, openinv]
    permission-message: "You don't have permission to use this command."
  pvp:
    description: Toggle your PvP status on or off.
    usage: /pvp [on|off|status]
    permission: kelpylandia.pvp
    aliases: [pvptoggle]
  jail:
    description: Jail a player for a specified duration.
    usage: /jail <player> <duration> [reason]
    permission: kelpylandia.mod.jail
    permission-message: "You don't have permission to use this command."
  release:
    description: Release a player from jail.
    usage: /release <player> [reason]
    permission: kelpylandia.mod.jail
    aliases: [unjail]
    permission-message: "You don't have permission to use this command."
  freeze:
    description: Freeze a player in place.
    usage: /freeze <player>
    permission: kelpylandia.mod.freeze
    permission-message: "You don't have permission to use this command."
  unfreeze:
    description: Unfreeze a player.
    usage: /unfreeze <player>
    permission: kelpylandia.mod.freeze
    aliases: [thaw]
    permission-message: "You don't have permission to use this command."

  # Home, TPA, Back, and Workbench commands are registered dynamically
  # based on config settings. They will not appear here to avoid
  # conflicting with other plugins when disabled.

permissions:
  kelpylandia.*:
    description: Grants all permissions
    default: op
    children:
      kelpylandia.admin: true
      kelpylandia.mod.*: true
      kelpylandia.channel.*: true
      kelpylandia.pvp: true
      kelpylandia.homes: true
      kelpylandia.tpa: true
      kelpylandia.tpa.here: true
      kelpylandia.teleport.bypass.cooldown: true
      kelpylandia.back: true
      kelpylandia.dback: true
      kelpylandia.back.bypass.cooldown: true
      kelpylandia.spawn: true
      kelpylandia.spawn.others: true
      kelpylandia.gamemode.*: true
      kelpylandia.workbench.*: true
      kelpylandia.nickname: true
      kelpylandia.nickname.others: true
      kelpylandia.enchant: true
      kelpylandia.enchant.unsafe: true
      kelpylandia.afk: true
      kelpylandia.msg: true
      kelpylandia.msg.reply: true
      kelpylandia.msg.whispertoggle: true
      kelpylandia.suicide: true
      kelpylandia.skull: true
      kelpylandia.repair: true
      kelpylandia.repair.others: true
      kelpylandia.sudo: true
      kelpylandia.socialspy: true
      kelpylandia.commandspy: true
      kelpylandia.fly: true
      kelpylandia.fly.others: true
      kelpylandia.god: true
      kelpylandia.god.others: true
      kelpylandia.heal: true
      kelpylandia.heal.others: true
      kelpylandia.starve: true
      kelpylandia.starve.others: true
      kelpylandia.feed: true
      kelpylandia.feed.others: true
      kelpylandia.flyspeed: true
      kelpylandia.flyspeed.others: true
      kelpylandia.trash: true
      kelpylandia.lore: true
      kelpylandia.hat: true
      kelpylandia.warp: true
      kelpylandia.setwarp: true
      kelpylandia.delwarp: true
      kelpylandia.rtp: true
      kelpylandia.seen: true
      kelpylandia.stuck: true
      kelpylandia.noclip: true
      kelpylandia.homes.others: true
      kelpylandia.rules: true
      kelpylandia.smite: true
      kelpylandia.report: true
      kelpylandia.report.notify: true
      
  kelpylandia.admin:
    description: Allows admin commands
    default: op
    
  kelpylandia.reload:
    description: Allows reloading the plugin configuration
    default: op
    
  kelpylandia.mod.*:
    description: Grants all moderation permissions
    default: op
    children:
      kelpylandia.mod.mute: true
      kelpylandia.mod.warn: true
      kelpylandia.mod.kick: true
      kelpylandia.mod.ban: true
      kelpylandia.mod.ipban: true
      kelpylandia.mod.warns: true
      kelpylandia.mod.history: true
      kelpylandia.mod.unban: true
      kelpylandia.mod.unwarn: true
      kelpylandia.mod.unmute: true
      kelpylandia.vanish: true
      kelpylandia.vanish.others: true
      kelpylandia.vanish.see: true
      kelpylandia.invsee: true
      kelpylandia.mod.jail: true
      kelpylandia.mod.freeze: true
      
  kelpylandia.mod.basic:
    description: Basic moderation permissions
    default: false
    children:
      kelpylandia.mod.mute: true
      kelpylandia.mod.warn: true
      kelpylandia.mod.kick: true
      kelpylandia.mod.warns: true
      kelpylandia.mod.history: true
      kelpylandia.mod.unmute: true
      kelpylandia.mod.unwarn: true
      
  kelpylandia.mod.advanced:
    description: Advanced moderation permissions
    default: false
    children:
      kelpylandia.mod.ban: true
      kelpylandia.mod.ipban: true
      kelpylandia.mod.unban: true
      
  kelpylandia.channel.*:
    description: Grants all channel permissions
    default: false
    children:
      kelpylandia.channel.use: true
      kelpylandia.channel.admin: true
      
  kelpylandia.channel.use:
    description: Allows basic channel usage
    default: true
    
  kelpylandia.channel.admin:
    description: Allows channel administration
    default: op
    
  kelpylandia.vanish:
    description: Allows vanishing and unvanishing
    default: op
    
  kelpylandia.vanish.others:
    description: Allows vanishing other players
    default: op
    
  kelpylandia.vanish.see:
    description: Allows seeing vanished players
    default: op
    
  kelpylandia.invsee:
    description: Allows viewing and modifying other players' inventories
    default: op
    
  kelpylandia.pvp:
    description: Allows toggling PvP status
    default: true
    
  # Home Permissions
  kelpylandia.homes:
    description: Grants all home permissions
    default: true
    children:
      kelpylandia.homes.teleport: true
      kelpylandia.homes.set: true
      kelpylandia.homes.delete: true
      kelpylandia.homes.list: true

  kelpylandia.homes.teleport:
    description: Allows using /home to teleport to homes
    default: true

  kelpylandia.homes.set:
    description: Allows using /sethome to create homes
    default: true

  kelpylandia.homes.delete:
    description: Allows using /delhome to delete homes
    default: true

  kelpylandia.homes.list:
    description: Allows using /homes to list homes
    default: true
    
  # TPA Permissions
  kelpylandia.tpa:
    description: Allows sending and receiving teleport requests
    default: true
    
  kelpylandia.tpa.here:
    description: Allows using /tpahere to request others teleport to you
    default: true
    
  kelpylandia.teleport.bypass.cooldown:
    description: Bypass teleport cooldown
    default: op

  # Workbench Permissions
  kelpylandia.workbench.*:
    description: Grants all workbench permissions
    default: true
    children:
      kelpylandia.workbench.craft: true
      kelpylandia.workbench.enderchest: true
      kelpylandia.workbench.anvil: true
      kelpylandia.workbench.grindstone: true
      kelpylandia.workbench.stonecutter: true
      kelpylandia.workbench.smithing: true
      kelpylandia.workbench.cartography: true
      kelpylandia.workbench.loom: true

  kelpylandia.workbench.craft:
    description: Allows opening a virtual crafting table
    default: true

  kelpylandia.workbench.enderchest:
    description: Allows opening your ender chest
    default: true

  kelpylandia.workbench.anvil:
    description: Allows opening a virtual anvil
    default: true

  kelpylandia.workbench.grindstone:
    description: Allows opening a virtual grindstone
    default: true

  kelpylandia.workbench.stonecutter:
    description: Allows opening a virtual stonecutter
    default: true

  kelpylandia.workbench.smithing:
    description: Allows opening a virtual smithing table
    default: true

  kelpylandia.workbench.cartography:
    description: Allows opening a virtual cartography table
    default: true

  kelpylandia.workbench.loom:
    description: Allows opening a virtual loom
    default: true

  kelpylandia.workbench.others:
    description: Allows opening workbenches for other players
    default: op

  kelpylandia.back:
    description: Allows using /back to return to previous location
    default: true

  kelpylandia.dback:
    description: Allows using /dback to return to death location
    default: true

  kelpylandia.back.bypass.cooldown:
    description: Bypass the back command cooldown
    default: op

  # Spawn Permissions
  kelpylandia.spawn:
    description: Allows using /spawn to teleport to world spawn
    default: true

  kelpylandia.spawn.others:
    description: Allows teleporting other players to spawn
    default: op

  # Gamemode Permissions
  kelpylandia.gamemode.*:
    description: Grants all gamemode permissions
    default: op
    children:
      kelpylandia.gamemode.survival: true
      kelpylandia.gamemode.creative: true
      kelpylandia.gamemode.adventure: true
      kelpylandia.gamemode.spectator: true
      kelpylandia.gamemode.others: true

  kelpylandia.gamemode.survival:
    description: Allows switching to survival mode
    default: op

  kelpylandia.gamemode.creative:
    description: Allows switching to creative mode
    default: op

  kelpylandia.gamemode.adventure:
    description: Allows switching to adventure mode
    default: op

  kelpylandia.gamemode.spectator:
    description: Allows switching to spectator mode
    default: op

  kelpylandia.gamemode.others:
    description: Allows changing other players' gamemode
    default: op

  # Nickname Permissions
  kelpylandia.nickname:
    description: Allows using /nick to set or reset your own nickname
    default: true

  kelpylandia.nickname.others:
    description: Allows setting or resetting other players' nicknames
    default: op

  # Enchant Permissions
  kelpylandia.enchant:
    description: Allows using /enchant to enchant items
    default: op

  kelpylandia.enchant.unsafe:
    description: Allows bypassing enchantment limits (any level, any item)
    default: op

  # AFK Permissions
  kelpylandia.afk:
    description: Allows using /afk to toggle AFK status
    default: true

  # Messaging Permissions
  kelpylandia.msg:
    description: Allows sending private messages with /w
    default: true

  kelpylandia.msg.reply:
    description: Allows using /r to reply to private messages
    default: true

  kelpylandia.msg.whispertoggle:
    description: Allows using /wt to set or clear whisper target
    default: true

  # Suicide Permission
  kelpylandia.suicide:
    description: Allows using /suicide to kill yourself
    default: true

  # Skull Permission
  kelpylandia.skull:
    description: Allows using /skull to get a player head
    default: op

  # Repair Permissions
  kelpylandia.repair:
    description: Allows using /repair to repair your own items
    default: op

  kelpylandia.repair.others:
    description: Allows using /repair on other players
    default: op

  # Sudo Permission
  kelpylandia.sudo:
    description: Allows using /sudo to force players to run commands
    default: op

  # SocialSpy Permission
  kelpylandia.socialspy:
    description: Allows using /ss to spy on private messages and channel chat
    default: op

  # CommandSpy Permission
  kelpylandia.commandspy:
    description: Allows using /cs to spy on commands other players run
    default: op

  # Fly Permissions
  kelpylandia.fly:
    description: Allows using /fly to toggle flight mode
    default: op

  kelpylandia.fly.others:
    description: Allows using /fly on other players or * for all
    default: op

  # God Permissions
  kelpylandia.god:
    description: Allows using /god to toggle invincibility
    default: op

  kelpylandia.god.others:
    description: Allows using /god on other players or * for all
    default: op

  # Heal Permissions
  kelpylandia.heal:
    description: Allows using /heal to heal yourself
    default: op

  kelpylandia.heal.others:
    description: Allows using /heal on other players or * for all
    default: op

  # Starve Permissions
  kelpylandia.starve:
    description: Allows using /starve to starve yourself
    default: op

  kelpylandia.starve.others:
    description: Allows using /starve on other players or * for all
    default: op

  # Feed Permissions
  kelpylandia.feed:
    description: Allows using /feed to fill your food bar
    default: op

  kelpylandia.feed.others:
    description: Allows using /feed on other players or * for all
    default: op

  # FlySpeed/WalkSpeed Permissions
  kelpylandia.flyspeed:
    description: Allows using /flyspeed and /walkspeed to change your speed
    default: op

  kelpylandia.flyspeed.others:
    description: Allows using /flyspeed and /walkspeed on other players
    default: op

  # Trash Permission
  kelpylandia.trash:
    description: Allows using /trash to open a disposal inventory
    default: true

  # Lore Permission
  kelpylandia.lore:
    description: Allows using /lore to edit item lore
    default: op

  # Hat Permission
  kelpylandia.hat:
    description: Allows using /hat to wear items on your head
    default: true

  # Warp Permissions
  kelpylandia.warp:
    description: Allows using /warp and /warps
    default: true

  kelpylandia.setwarp:
    description: Allows creating warps with /setwarp
    default: op

  kelpylandia.delwarp:
    description: Allows deleting warps with /delwarp
    default: op

  # Random Teleport Permission
  kelpylandia.rtp:
    description: Allows using /rtp for random teleportation
    default: true

  # Seen Permission
  kelpylandia.seen:
    description: Allows using /seen to check when a player was last online
    default: op

  # Jail Permission
  kelpylandia.mod.jail:
    description: Allows jailing and releasing players
    default: op

  # Freeze Permission
  kelpylandia.mod.freeze:
    description: Allows freezing and unfreezing players
    default: op

  # Stuck Permission
  kelpylandia.stuck:
    description: Allows using /stuck to escape nether roof or void
    default: true

  # Noclip Permission
  kelpylandia.noclip:
    description: Allows using /noclip to fly through blocks
    default: op

  # Admin Home Access Permission
  kelpylandia.homes.others:
    description: Allows teleporting to other players' homes
    default: op

  # Rules Permission
  kelpylandia.rules:
    description: Allows using /rules to view server rules
    default: true

  # Smite Permission
  kelpylandia.smite:
    description: Allows using /smite to strike lightning on a player
    default: op

  # Report Permissions
  kelpylandia.report:
    description: Allows using /report to submit player or bug reports
    default: true

  kelpylandia.report.notify:
    description: Receive staff notifications when reports are submitted
    default: op
